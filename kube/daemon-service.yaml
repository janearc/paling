# =============================================================================
# paling daemon — the bare-metal exception (the "weird eel")
# =============================================================================
# `paling serve` runs on the HOST, not in a pod: it needs Apple Silicon's Metal
# GPU for MLX, which a Linux container cannot reach. We still want in-cluster
# clients to address it by a stable name.
#
# We model it as an ExternalName Service that CNAMEs the stable cluster name to
# `host.k3d.internal` — the name k3d injects into CoreDNS for the host gateway —
# which CoreDNS resolves to the host at RUNTIME. So NO host IP is baked into this
# manifest: if colima/lima's gateway address changes, this keeps working because
# it follows the name, not a frozen IP. (The earlier form pinned a literal
# 192.168.5.2 in a manual Endpoints, since an Endpoints `address` requires an IP
# and cannot hold a DNS name — that brittleness is exactly what this avoids.)
#
#   in-cluster client -> paling.fleet.svc.cluster.local  (CNAME)
#                     -> host.k3d.internal  (CoreDNS -> the host)  -> :8090
#
# The Go sidecar reaches the daemon the same way, by name, via PALING_DAEMON_BASE
# (default http://host.k3d.internal:8090) — see sidecar/main.go. If a k3d build
# does not inject host.k3d.internal, point externalName at another resolvable
# host name (or the host's LAN name); the daemon must listen on :8090 on the host.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: paling
  namespace: fleet
  labels:
    app.kubernetes.io/name: paling
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/component: daemon
spec:
  type: ExternalName
  externalName: host.k3d.internal
  ports:
    - name: http
      port: 8090
      protocol: TCP
