# =============================================================================
# paling Go sidecar — the containerizable half of the weird eel
# =============================================================================
# The daemon stays bare-metal (see daemon-endpoints.yaml); the sidecar is an
# ordinary stateless Go service and migrates like any other fleet Deployment.
# It does three jobs that have to live in the cluster:
#   - polls the bare-metal daemon's /health across the host boundary (liveness
#     of the MLX process, surfaced as Prometheus counters),
#   - exposes /metrics for the fleet scraper and /health for kube probes,
#   - bridges paling to Kafka (emit/consume) — best-effort, never fatal.
# All on :9090 (see sidecar/main.go).
#
# HOST GATEWAY (resolved by name, no baked IP):
#   The sidecar reaches the bare-metal daemon by NAME, not a hardcoded IP.
#   sidecar/main.go reads the daemon base from PALING_DAEMON_BASE, defaulting to
#   http://host.k3d.internal:8090 — `host.k3d.internal` is the name k3d injects
#   into CoreDNS for the host gateway, resolved at runtime. So there is no
#   hostAliases hack and no frozen 192.168.5.2 here (the earlier form pinned that
#   IP and had to stay in sync with a manual daemon Endpoints — both are gone;
#   the daemon Service is now an ExternalName, see daemon-service.yaml). Override
#   PALING_DAEMON_BASE below if a k3d build does not inject the name.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paling-sidecar
  namespace: fleet
  labels:
    app.kubernetes.io/name: paling-sidecar
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/component: sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paling-sidecar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paling-sidecar
        app.kubernetes.io/part-of: fleet
        app.kubernetes.io/component: sidecar
      annotations:
        # The fleet Prometheus scrapes pods that opt in via these annotations;
        # /metrics on :9090 carries the paling_poll_* counters and the
        # error-time-of-day histogram (see sidecar/main.go).
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: paling-sidecar
          # Locally-built image — built from sidecar/Dockerfile, NOT pulled.
          # Pinned to an explicit tag (never :latest): the primary agent imports
          # this exact tag into k3d with `k3d image import`, so the cached image
          # matches and no registry pull happens. Build + tag before apply:
          #   docker build -t paling-sidecar:v1 ./sidecar
          #   k3d image import paling-sidecar:v1 -c fleet
          # Bump the tag deliberately when the sidecar changes; do not float it.
          # v1: daemon URL resolves host.k3d.internal by name (no baked host IP);
          # also drops the removed registerWithDelightd path.
          image: paling-sidecar:v1
          # The image is local-only, so never let the kubelet try a registry
          # pull — that would fail (and waste the throttled link). IfNotPresent
          # uses the imported image and only pulls if genuinely absent.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          env:
            # Kafka emission/consume is best-effort in the sidecar; point it at
            # the in-cluster brokers. If kafka has not migrated yet these names
            # may not resolve — the sidecar logs and disables emission, it does
            # not crash (symmetric emit/consume degradation, see main.go).
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: SCHEMA_REGISTRY_URL
              value: http://schema-registry:8081
            # The bare-metal daemon's base URL, resolved by NAME (no baked IP):
            # host.k3d.internal is k3d's CoreDNS host-gateway name. The /health
            # poll and the orchestrate relay both derive from this base (see
            # PALING_DAEMON_BASE / PALING_DAEMON_ORCHESTRATE_URL in main.go).
            - name: PALING_DAEMON_BASE
              value: http://host.k3d.internal:8090
          # /health on :9090 returns 200 once the HTTP server is up. It reflects
          # the SIDECAR's own liveness, not the bare-metal daemon's — daemon
          # health is surfaced as the paling_poll_* metrics, deliberately, so a
          # daemon blip does not get the sidecar killed and restarted.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            # Modest — a poll loop, a metrics endpoint, and a Kafka client on a
            # laptop cluster.
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
---
# In-cluster name for the sidecar's :9090 (metrics + /health + /emit). This is a
# normal selector-backed Service — unlike the daemon's, it fronts a real pod.
apiVersion: v1
kind: Service
metadata:
  name: paling-sidecar
  namespace: fleet
  labels:
    app.kubernetes.io/name: paling-sidecar
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/component: sidecar
spec:
  selector:
    app.kubernetes.io/name: paling-sidecar
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
